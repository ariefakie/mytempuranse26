<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – SIMON-SE26TEMPURAN SE2026 Tempuran</title>
  <meta name="description" content="Dashboard monitoring Sensus Ekonomi 2026 Kecamatan Tempuran" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="dark-mode">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-icon-sm">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="url(#sbGrad)"/>
          <path d="M8 22L13 12L18 18L22 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="9" r="2.5" fill="white"/>
          <defs><linearGradient id="sbGrad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <div class="brand-text-sm">
        <span class="brand-name-sm">SIMON-SE26TEMPURAN</span>
        <span class="brand-sub-sm">SE2026</span>
      </div>
    </div>
    <button class="sidebar-close" id="sidebarClose">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard',event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="#" class="nav-item" data-page="progres" onclick="navigateTo('progres',event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <span>Progres Lapangan</span>
      <span class="nav-badge">8,851</span>
    </a>
    <a href="#" class="nav-item" data-page="biodata" onclick="navigateTo('biodata',event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Biodata Petugas</span>
      <span class="nav-badge">52</span>
    </a>
    <a href="#" class="nav-item" data-page="alokasi" onclick="navigateTo('alokasi',event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Alokasi Petugas</span>
      <span class="nav-badge">251</span>
    </a>
    <a href="#" class="nav-item" data-page="profil" onclick="navigateTo('profil',event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil Saya</span>
    </a>
    <a href="#" class="nav-item" data-page="config" onclick="navigateTo('config',event)" id="navConfig" style="display:none">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Konfigurasi</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebarUser">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-info">
        <div class="user-name" id="userName">Admin</div>
        <div class="user-role" id="userRole">Administrator</div>
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="btn-icon-sm" id="themeToggle" title="Toggle tema" onclick="toggleTheme()">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="btn-icon-sm btn-danger-sm" title="Keluar" onclick="handleLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<main class="main" id="main">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="btn-menu" id="menuBtn" onclick="openSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
        <p class="page-sub" id="pageSub">Ringkasan Progres SE2026 Kecamatan Tempuran</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-datetime" id="topbarDatetime"></div>
      <div class="status-live">
        <span class="live-dot"></span>
        <span>Live</span>
      </div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div class="page-content" id="pageContent">
    <!-- Injected by JS -->
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Memuat data...</p>
    </div>
  </div>
</main>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" id="modalBox" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="assets/js/supabase.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/sls_stats.js"></script>
</body>
</html>
